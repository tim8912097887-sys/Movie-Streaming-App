server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index  index.html index.htm;
        # For react routing
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://nginx-server:8080/api/;
        proxy_set_header Host $host;
    }
}